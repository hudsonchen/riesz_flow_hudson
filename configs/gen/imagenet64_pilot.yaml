logging:
  use_wandb: false
  log_every_k: 10

dataset:
  resolution: 64
  use_aug: false
  use_latent: true
  # The released cache contains 32x32 latents for 256px images, so encode the
  # 64px images online into 8x8 latents instead.
  use_cache: false
  num_classes: 1000
  # The local ILSVRC validation images are flat rather than class-organized.
  # Reuse the class-organized training split only for periodic sample previews.
  eval_split: train
  batch_size: 256
  eval_batch_size: 64
  kwargs:
    num_workers: 8
    pin_memory: true
    prefetch_factor: 2

model:
  cond_dim: 192
  input_size: 8
  in_channels: 4
  patch_size: 2

  hidden_size: 192
  depth: 6
  num_heads: 6
  mlp_ratio: 4.0
  out_channels: 4

  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  n_cls_tokens: 4
  noise_classes: 64
  noise_coords: 8
  use_bf16: true
  attn_fp32: true

optimizer:
  lr_schedule:
    learning_rate: 0.0002
    warmup_steps: 500
    lr_schedule: "const"
    total_steps: 10000
  weight_decay: 0.01
  adam_b1: 0.9
  adam_b2: 0.95

train:
  diverse_noise: true
  train_batch_size: 8
  seed: 42
  total_steps: 10000
  save_per_step: 500
  keep_every: 2500
  eval_per_step: 500
  eval_samples: 64
  sanity_samples: 64
  # A 64px preview has no matching reference-statistics file. Save sample
  # grids during evaluation without reporting a misleading ImageNet-256 FID.
  eval_fid: false
  eval_isc: false
  eval_prc_recall: false
  pos_per_sample: 16
  neg_per_sample: 8
  positive_bank_size: 32
  negative_bank_size: 256
  forward_dict:
    gen_per_label: 16
    cfg_min: 1.0
    cfg_max: 4.0
    neg_cfg_pw: 3.0
  activation_kwargs:
    # At 8x8 latent resolution, retain the principal MAE spatial hierarchy and
    # avoid the 63 extra patch-statistic/intermediate-block feature views used
    # by the full 32x32 setup.
    patch_mean_size: []
    patch_std_size: []
    use_std: false
    use_mean: false
    every_k_block: .inf
  loss_kwargs:
    R_list: [0.05]
  cfg_list: [1.0, 1.5, 2.0, 2.5]
  ema_decay: 0.999
  push_per_step: 256
  grad_accum_steps: 2
  max_grad_norm: 2.0

  ot_mode: "debiased"
  ot_kwargs:
    sinkhorn_num_iter: 10
    use_new_cfg: true
    disable_diag_mask: true
    resample_neg: true
    batch_sinkhorn: false
    use_quadratic_cost: true

feature:
  mae_path: "hf://mae_latent_256"
  use_mae: true
  use_convnext: false
