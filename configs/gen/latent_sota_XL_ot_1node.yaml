logging:
  use_wandb: true
  log_every_k: 20

dataset:
  resolution: 256
  use_aug: false
  use_latent: true
  use_cache: true
  num_classes: 1000
  batch_size: 512
  eval_batch_size: 2048
  kwargs:
    num_workers: 8
    pin_memory: true
    prefetch_factor: 2

model:
  cond_dim: 1152
  input_size: 32
  in_channels: 4
  patch_size: 2

  hidden_size: 1152
  depth: 28
  num_heads: 16
  mlp_ratio: 4.0
  out_channels: 4

  use_qknorm: true
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  n_cls_tokens: 16
  noise_classes: 64
  noise_coords: 32
  use_bf16: true
  attn_fp32: false
  use_remat: true

optimizer:
  lr_schedule:
    learning_rate: 0.0003
    warmup_steps: 10000
    lr_schedule: "const"
    total_steps: 100000
  weight_decay: 0.01
  adam_b1: 0.9
  adam_b2: 0.95

train:
  diverse_noise: true
  train_batch_size: 128
  seed: 42
  total_steps: 200000
  save_per_step: 2000
  keep_every: 20000
  eval_per_step: 5000
  pos_per_sample: 128
  neg_per_sample: 32
  positive_bank_size: 128
  negative_bank_size: 1000
  push_per_step: 128
  grad_accum_steps: 8
  forward_dict:
    gen_per_label: 64
    cfg_min: 1.0
    cfg_max: 4.0
    neg_cfg_pw: 4.0
    no_cfg_frac: 0.2
  activation_kwargs:
    patch_mean_size: [2, 4]
    patch_std_size: [2, 4]
    use_std: true
    use_mean: true
    every_k_block: 2
  loss_kwargs:
    R_list: [0.01]
  cfg_list: [1.0, 1.1, 1.2, 1.4, 1.6, 1.8, 2.0, 2.5, 3.0, 3.5]
  ema_decay: 0.999

  # --- OT loss config ---
  ot_mode: "debiased"
  ot_kwargs:
    sinkhorn_num_iter: 1
    use_new_cfg: true
    disable_diag_mask: true
    resample_neg: true
    batch_sinkhorn: false
    use_quadratic_cost: true

feature:
  mae_path: "hf://mae_latent_640"
  use_mae: true
  use_convnext: false
